server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: blog-app
  datasource:
    url: jdbc:h2:mem:blog_app
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-key-change-in-production-at-least-32-characters-long}
    expiration: 3600000
    refresh-expiration: 604800000
  mail:
    from: ${APP_MAIL_FROM:noreply@blogapp.com}
    frontend-url: ${APP_MAIL_FRONTEND_URL:http://localhost:3000}

logging:
  level:
    root: INFO
    com.blogapp: DEBUG

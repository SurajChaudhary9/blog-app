server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: blog-app
  
  # Database Configuration
  datasource:
    url: jdbc:h2:mem:blog_app
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  # H2 Console (for development only)
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # Mail Configuration
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Application Configuration
app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-key-change-in-production-min-32-characters-long-key}
    expiration: 3600000  # 1 hour in milliseconds
    refresh-expiration: 604800000  # 7 days in milliseconds
  
  mail:
    from: ${APP_MAIL_FROM:noreply@blogapp.com}
    frontend-url: ${APP_MAIL_FRONTEND_URL:http://localhost:3000}

# Logging
logging:
  level:
    root: INFO
    com.blogapp: DEBUG
    org.springframework.security: DEBUG
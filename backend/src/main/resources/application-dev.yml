server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:blog_app
    driver-class-name: org.h2.Driver
  
  jpa:
    show-sql: true
  
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password

app:
  jwt:
    secret: dev-secret-key-min-32-characters-long-for-testing
  mail:
    frontend-url: http://localhost:3000

logging:
  level:
    root: INFO
    com.blogapp: DEBUG